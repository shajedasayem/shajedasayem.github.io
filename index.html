<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
<title>Messages</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  :root{
    --black:#000000;
    --white:#ffffff;
    --gray-1:#0d0d0d;
    --gray-3:#333333;
    --gray-4:#7a7a7a;
    --app-height:100dvh;
  }

  html,body{
    height:100%;
    overflow:hidden;
    overscroll-behavior:none;
    background:var(--black);
    color:var(--white);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    font-size:14px;
    line-height:1.4;
    -webkit-text-size-adjust:100%;
  }

  /* locks the page itself so it can never scroll or bounce;
     only .messages is allowed to move */
  body{
    position:fixed;
    inset:0;
    width:100%;
  }

  .app{
    display:flex;
    flex-direction:column;
    height:var(--app-height);
    max-width:420px;
    margin:0 auto;
    border-left:1px solid var(--gray-3);
    border-right:1px solid var(--gray-3);
    overflow:hidden;
  }

  /* column-reverse anchors scroll to the newest (bottom) message
     without any JS scroll handling. DOM order is newest-first. */
  .messages{
    flex:1;
    min-height:0;
    overflow-y:auto;
    overscroll-behavior:contain;
    -webkit-overflow-scrolling:touch;
    touch-action:pan-y;
    padding:14px;
    display:flex;
    flex-direction:column-reverse;
    align-items:flex-start;
    gap:2px;
  }

  .bubble{
    width:fit-content;
    max-width:75%;
    padding:8px 10px;
    font-size:13.5px;
    border:1px solid var(--gray-3);
    background:var(--gray-1);
    color:var(--white);
    word-wrap:break-word;
  }

  .input-bar{
    display:flex;
    align-items:flex-end;
    gap:8px;
    padding:10px 12px;
    padding-bottom:calc(10px + env(safe-area-inset-bottom));
    border-top:1px solid var(--gray-3);
    background:var(--black);
    flex-shrink:0;
  }

  /* contenteditable composer instead of <input> — avoids iOS auto-zoom,
     grows naturally with content, no native mobile input chrome */
  .msg-input{
    flex:1;
    min-height:38px;
    background:var(--gray-1);
    border:1px solid var(--gray-3);
    color:var(--white);
    padding:9px 10px;
    font-size:14px;
    font-family:inherit;
    line-height:1.4;
    max-height:110px;
    overflow-y:auto;
    white-space:pre-wrap;
    word-break:break-word;
    outline:none;
  }

  .msg-input:focus{
    border-color:var(--white);
  }

  .msg-input:empty::before{
    content:attr(data-placeholder);
    color:var(--gray-4);
  }

  .send-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    height:38px;
    background:var(--white);
    color:var(--black);
    border:1px solid var(--white);
    padding:0 14px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    font-family:inherit;
    flex-shrink:0;
  }

  .send-btn:active{
    background:var(--gray-4);
  }

  .send-btn:disabled{
    background:var(--gray-1);
    color:var(--gray-4);
    border-color:var(--gray-3);
    cursor:default;
  }

  .messages::-webkit-scrollbar{ width:6px; }
  .messages::-webkit-scrollbar-track{ background:var(--black); }
  .messages::-webkit-scrollbar-thumb{ background:var(--gray-3); }
</style>
</head>
<body>

<div class="app">

  <!-- DOM order is newest-first; column-reverse flips it visually
       so oldest sits at top, newest sits at bottom, scroll anchored to bottom -->
  <div class="messages" id="messages"></div>

  <div class="input-bar" id="composer">
    <div
      id="msgInput"
      class="msg-input"
      contenteditable="true"
      role="textbox"
      aria-label="Message"
      data-placeholder="Type a message"
    ></div>
    <button type="button" class="send-btn" id="sendBtn" disabled>Send</button>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import {
    getDatabase,
    ref,
    push,
    onChildAdded,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBmQN2A5Epw396HK0SO4fyMY2bSa4rty4c",
    authDomain: "shajedasayem-github-io.firebaseapp.com",
    databaseURL: "https://shajedasayem-github-io-default-rtdb.firebaseio.com",
    projectId: "shajedasayem-github-io",
    storageBucket: "shajedasayem-github-io.firebasestorage.app",
    messagingSenderId: "496263411280",
    appId: "1:496263411280:web:29e3ce18038791d222c355"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const messagesRef = ref(db, "messages");

  const messages = document.getElementById('messages');
  const input = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');

  function hasText(){
    return input.textContent.trim().length > 0;
  }

  input.addEventListener('input', function(){
    sendBtn.disabled = !hasText();
  });

  // Enter sends, Shift+Enter makes a new line
  input.addEventListener('keydown', function(e){
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  function sendMessage(){
    const text = input.textContent.trim();
    if(!text) return;

    push(messagesRef, {
      text: text,
      createdAt: serverTimestamp()
    });

    // clear content only — no .focus() call, no delay.
    // the contenteditable div keeps whatever focus/keyboard state
    // it already had, so Android's on-screen keyboard never flickers.
    input.textContent = '';
    sendBtn.disabled = true;
  }

  // fires once per existing message on load, then again for every new one
  // pushed after — arrival order is oldest to newest, and prepending each
  // in that order lands the newest message at the bottom (column-reverse)
  onChildAdded(messagesRef, function(snapshot){
    const data = snapshot.val();
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = data.text;
    messages.prepend(bubble);
  });

  // keeps --app-height in sync with the real visible viewport,
  // so the composer stays pinned above Android/iOS keyboards
  // instead of getting pushed off-screen or leaving a dead gap
  function syncViewportHeight(){
    const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
    document.documentElement.style.setProperty('--app-height', vh + 'px');
  }

  if(window.visualViewport){
    window.visualViewport.addEventListener('resize', syncViewportHeight);
    window.visualViewport.addEventListener('scroll', syncViewportHeight);
  } else {
    window.addEventListener('resize', syncViewportHeight);
  }
  syncViewportHeight();
</script>

</body>
</html>
