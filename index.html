<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  :root{
    --black:#000000;
    --white:#ffffff;
    --gray-1:#0d0d0d;
    --gray-3:#333333;
    --gray-4:#7a7a7a;
  }

  html,body{
    height:100%;
    background:var(--black);
    color:var(--white);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    font-size:14px;
    line-height:1.4;
  }

  .app{
    display:flex;
    flex-direction:column;
    height:100vh;
    max-width:420px;
    margin:0 auto;
    border-left:1px solid var(--gray-3);
    border-right:1px solid var(--gray-3);
  }

  /* column-reverse anchors scroll to the newest (bottom) message
     without any JS scroll handling. DOM order is newest-first. */
  .messages{
    flex:1;
    overflow-y:auto;
    padding:14px;
    display:flex;
    flex-direction:column-reverse;
    align-items:flex-start;
    gap:2px;
  }

  .bubble{
    width:fit-content;
    max-width:75%;
    padding:8px 10px;
    font-size:13.5px;
    border:1px solid var(--gray-3);
    background:var(--gray-1);
    color:var(--white);
    word-wrap:break-word;
  }

  .input-bar{
    display:flex;
    align-items:center;
    gap:8px;
    padding:10px 12px;
    border-top:1px solid var(--gray-3);
    background:var(--black);
    flex-shrink:0;
  }

  .input-bar input{
    flex:1;
    background:var(--gray-1);
    border:1px solid var(--gray-3);
    color:var(--white);
    padding:9px 10px;
    font-size:13.5px;
    font-family:inherit;
    outline:none;
  }

  .input-bar input::placeholder{
    color:var(--gray-4);
  }

  .input-bar input:focus{
    border-color:var(--white);
  }

  .send-btn{
    background:var(--white);
    color:var(--black);
    border:1px solid var(--white);
    padding:9px 14px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    font-family:inherit;
  }

  .send-btn:active{
    background:var(--gray-4);
  }

  .send-btn:disabled{
    background:var(--gray-1);
    color:var(--gray-4);
    border-color:var(--gray-3);
    cursor:default;
  }

  .messages::-webkit-scrollbar{ width:6px; }
  .messages::-webkit-scrollbar-track{ background:var(--black); }
  .messages::-webkit-scrollbar-thumb{ background:var(--gray-3); }
</style>
</head>
<body>

<div class="app">

  <!-- DOM order is newest-first; column-reverse flips it visually
       so oldest sits at top, newest sits at bottom, scroll anchored to bottom -->
  <div class="messages" id="messages"></div>

  <form class="input-bar" id="composer" autocomplete="off">
    <input
      type="text"
      id="msgInput"
      name="message"
      placeholder="Type a message"
      aria-label="Message"
      autocomplete="off"
      required
    />
    <button type="submit" class="send-btn" id="sendBtn" disabled>Send</button>
  </form>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import {
    getDatabase,
    ref,
    push,
    onChildAdded,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBmQN2A5Epw396HK0SO4fyMY2bSa4rty4c",
    authDomain: "shajedasayem-github-io.firebaseapp.com",
    databaseURL: "https://shajedasayem-github-io-default-rtdb.firebaseio.com",
    projectId: "shajedasayem-github-io",
    storageBucket: "shajedasayem-github-io.firebasestorage.app",
    messagingSenderId: "496263411280",
    appId: "1:496263411280:web:29e3ce18038791d222c355"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const messagesRef = ref(db, "messages");

  const form = document.getElementById('composer');
  const messages = document.getElementById('messages');
  const input = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');

  input.addEventListener('input', function(){
    sendBtn.disabled = input.value.trim().length === 0;
  });

  form.addEventListener('submit', function(e){
    e.preventDefault();

    const text = input.value.trim();
    if(!text) return;

    push(messagesRef, {
      text: text,
      createdAt: serverTimestamp()
    });

    input.value = '';
    sendBtn.disabled = true;
    input.focus();
  });

  // fires once per existing message on load, then again for every new one
  // pushed after — arrival order is oldest to newest, and prepending each
  // in that order lands the newest message at the bottom (column-reverse)
  onChildAdded(messagesRef, function(snapshot){
    const data = snapshot.val();
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = data.text;
    messages.prepend(bubble);
  });

  input.focus();
</script>

</body>
</html>
